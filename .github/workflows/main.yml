name: ci-cd

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

env:
  K8S_NAMESPACE: task-manager
  BACKEND_IMAGE_NAME: task-manager-backend
  FRONTEND_IMAGE_NAME: task-manager-frontend

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: |
            backend/package-lock.json
            frontend/package-lock.json

      - name: Install backend dependencies
        working-directory: backend
        run: npm ci

      - name: Backend syntax check
        working-directory: backend
        run: node --check server.js

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Frontend tests
        working-directory: frontend
        env:
          CI: true
        run: npm test -- --watchAll=false --passWithNoTests

      - name: Frontend production build
        working-directory: frontend
        run: npm run build

  build-and-push:
    runs-on: ubuntu-latest
    needs: test
    if: github.event_name != 'pull_request'
    permissions:
      contents: read
      packages: write
    outputs:
      backend_image: ${{ steps.images.outputs.backend_image }}
      frontend_image: ${{ steps.images.outputs.frontend_image }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set image names
        id: images
        shell: bash
        run: |
          repo_lower="$(echo "${GITHUB_REPOSITORY}" | tr '[:upper:]' '[:lower:]')"
          echo "backend_image=ghcr.io/${repo_lower}/${BACKEND_IMAGE_NAME}" >> "${GITHUB_OUTPUT}"
          echo "frontend_image=ghcr.io/${repo_lower}/${FRONTEND_IMAGE_NAME}" >> "${GITHUB_OUTPUT}"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push backend image
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          push: true
          tags: |
            ${{ steps.images.outputs.backend_image }}:latest
            ${{ steps.images.outputs.backend_image }}:${{ github.sha }}

      - name: Build and push frontend image
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          build-args: |
            REACT_APP_API_URL=/api
          push: true
          tags: |
            ${{ steps.images.outputs.frontend_image }}:latest
            ${{ steps.images.outputs.frontend_image }}:${{ github.sha }}

  deploy:
    runs-on: [self-hosted, windows, x64]
    needs: build-and-push
    if: github.event_name != 'pull_request'
    permissions:
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up kubectl
        uses: azure/setup-kubectl@v4

      - name: Configure kubeconfig
        shell: powershell -NoProfile -ExecutionPolicy Bypass -File {0}
        run: |
          New-Item -ItemType Directory -Force -Path "$HOME/.kube" | Out-Null
          [IO.File]::WriteAllBytes("$HOME/.kube/config", [Convert]::FromBase64String("${{ secrets.KUBE_CONFIG_DATA }}"))

      - name: Check cluster connectivity
        shell: powershell -NoProfile -ExecutionPolicy Bypass -File {0}
        run: |
          kubectl config current-context
          $server = kubectl config view --minify -o jsonpath='{.clusters[0].cluster.server}'
          Write-Host "Kubernetes API server: $server"
          kubectl cluster-info

      - name: Apply Kubernetes manifests
        shell: powershell -NoProfile -ExecutionPolicy Bypass -File {0}
        run: |
          kubectl apply -f k8s/deployment.yaml
          kubectl apply -f k8s/service.yaml
          kubectl apply -f k8s/ingress.yaml

      - name: Inject runtime JWT secret
        shell: powershell -NoProfile -ExecutionPolicy Bypass -File {0}
        run: |
          kubectl -n "${env:K8S_NAMESPACE}" create secret generic task-manager-secret --from-literal=JWT_SECRET="${{ secrets.JWT_SECRET }}" --dry-run=client -o yaml | kubectl apply -f -

      - name: Deploy new backend and frontend images
        shell: powershell -NoProfile -ExecutionPolicy Bypass -File {0}
        run: |
          kubectl -n "${env:K8S_NAMESPACE}" set image deployment/backend backend=${{ needs.build-and-push.outputs.backend_image }}:${{ github.sha }}
          kubectl -n "${env:K8S_NAMESPACE}" set image deployment/frontend frontend=${{ needs.build-and-push.outputs.frontend_image }}:${{ github.sha }}

      - name: Wait for rollout to finish
        shell: powershell -NoProfile -ExecutionPolicy Bypass -File {0}
        run: |
          kubectl -n "${env:K8S_NAMESPACE}" rollout status deployment/backend --timeout=180s
          kubectl -n "${env:K8S_NAMESPACE}" rollout status deployment/frontend --timeout=180s
          kubectl -n "${env:K8S_NAMESPACE}" get pods -o wide
