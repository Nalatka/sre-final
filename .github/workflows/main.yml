name: ci-cd

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

env:
  K8S_NAMESPACE: task-manager
  BACKEND_IMAGE_NAME: task-manager-backend
  FRONTEND_IMAGE_NAME: task-manager-frontend

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: |
            backend/package-lock.json
            frontend/package-lock.json

      - name: Install backend dependencies
        working-directory: backend
        run: npm ci

      - name: Backend syntax check
        working-directory: backend
        run: node --check server.js

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Frontend tests
        working-directory: frontend
        env:
          CI: true
        run: npm test -- --watchAll=false --passWithNoTests

      - name: Frontend production build
        working-directory: frontend
        run: npm run build

  build-and-push:
    runs-on: ubuntu-latest
    needs: test
    if: github.event_name != 'pull_request'
    permissions:
      contents: read
      packages: write
    outputs:
      backend_image: ${{ steps.images.outputs.backend_image }}
      frontend_image: ${{ steps.images.outputs.frontend_image }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set image names
        id: images
        run: |
          repo_lower="$(echo "${GITHUB_REPOSITORY}" | tr '[:upper:]' '[:lower:]')"
          echo "backend_image=ghcr.io/${repo_lower}/${BACKEND_IMAGE_NAME}" >> "${GITHUB_OUTPUT}"
          echo "frontend_image=ghcr.io/${repo_lower}/${FRONTEND_IMAGE_NAME}" >> "${GITHUB_OUTPUT}"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push backend image
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          push: true
          tags: |
            ${{ steps.images.outputs.backend_image }}:latest
            ${{ steps.images.outputs.backend_image }}:${{ github.sha }}

      - name: Build and push frontend image
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          build-args: |
            REACT_APP_API_URL=/api
          push: true
          tags: |
            ${{ steps.images.outputs.frontend_image }}:latest
            ${{ steps.images.outputs.frontend_image }}:${{ github.sha }}

  deploy:
    runs-on: ubuntu-latest
    needs: build-and-push
    if: github.event_name != 'pull_request'
    permissions:
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Kind
        uses: helm/kind-action@v1.8.0
        with:
          cluster_name: assignment6
          wait: 5m

      - name: Set up kubectl
        uses: azure/setup-kubectl@v4

      - name: Check cluster connectivity
        run: |
          kubectl config current-context
          kubectl cluster-info
          kubectl get nodes

      - name: Log in to GHCR
        run: |
          echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u "${{ github.actor }}" --password-stdin

      - name: Load backend image into kind
        run: |
          repo_lower="$(echo "${GITHUB_REPOSITORY}" | tr '[:upper:]' '[:lower:]')"
          backend_image="ghcr.io/${repo_lower}/${BACKEND_IMAGE_NAME}:${{ github.sha }}"
          docker pull "${backend_image}"
          kind load docker-image "${backend_image}" --name assignment6

      - name: Load frontend image into kind
        run: |
          repo_lower="$(echo "${GITHUB_REPOSITORY}" | tr '[:upper:]' '[:lower:]')"
          frontend_image="ghcr.io/${repo_lower}/${FRONTEND_IMAGE_NAME}:${{ github.sha }}"
          docker pull "${frontend_image}"
          kind load docker-image "${frontend_image}" --name assignment6

      - name: Create namespace
        run: |
          kubectl create namespace "${K8S_NAMESPACE}" || true

      - name: Apply Kubernetes manifests
        run: |
          kubectl apply -f k8s/deployment.yaml
          kubectl apply -f k8s/service.yaml
          kubectl apply -f k8s/ingress.yaml

      - name: Inject JWT secret
        run: |
          kubectl -n "${K8S_NAMESPACE}" create secret generic task-manager-secret --from-literal=JWT_SECRET="${{ secrets.JWT_SECRET }}" --dry-run=client -o yaml | kubectl apply -f -

      - name: Update backend image
        run: |
          repo_lower="$(echo "${GITHUB_REPOSITORY}" | tr '[:upper:]' '[:lower:]')"
          kubectl -n "${K8S_NAMESPACE}" set image deployment/backend backend="ghcr.io/${repo_lower}/${BACKEND_IMAGE_NAME}:${{ github.sha }}"

      - name: Update frontend image
        run: |
          repo_lower="$(echo "${GITHUB_REPOSITORY}" | tr '[:upper:]' '[:lower:]')"
          kubectl -n "${K8S_NAMESPACE}" set image deployment/frontend frontend="ghcr.io/${repo_lower}/${FRONTEND_IMAGE_NAME}:${{ github.sha }}"

      - name: Wait for rollout
        run: |
          kubectl -n "${K8S_NAMESPACE}" rollout status deployment/mongo --timeout=180s
          kubectl -n "${K8S_NAMESPACE}" rollout status deployment/backend --timeout=180s
          kubectl -n "${K8S_NAMESPACE}" rollout status deployment/frontend --timeout=180s

      - name: Show deployment status
        run: |
          kubectl -n "${K8S_NAMESPACE}" get pods -o wide
          kubectl -n "${K8S_NAMESPACE}" get svc
